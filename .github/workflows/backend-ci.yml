name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
      - 'docker-compose.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
      - 'docker-compose.yml'

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: voxscore
          POSTGRES_PASSWORD: voxscore
          POSTGRES_DB: voxscore
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U voxscore -d voxscore"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://voxscore:voxscore@localhost:5432/voxscore
      JWT_SECRET: ci-jwt-secret-minimum-32-characters-for-tests-only!!
      AUTH_DEV_TOKEN_ENABLED: 'true'
      AUTH_GOOGLE_MOCK_ENABLED: 'true'

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - run: npm run migration:run

      - run: npm run test

      - run: npm run test:integration

      - run: npm run test:e2e

      - run: npm run build
