server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Sem `$uri/`: para GET `/`, o `$uri/` pode resolver como directório e falhar
    # antes de cair em `index.html`, devolvendo 404 em alguns nginx/builds.
    location / {
        try_files $uri /index.html;
    }

    location /healthz {
        access_log off;
        default_type text/plain;
        return 200 'ok';
    }
}
