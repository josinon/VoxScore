apiVersion: apps/v1
kind: Deployment
metadata:
  name: voxscore-api
spec:
  replicas: 1
  template:
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -U voxscore -d voxscore; do sleep 2; done
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
